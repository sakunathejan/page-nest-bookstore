<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PageNest Bookshop - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>PageNest Bookshop</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="books.html">Books</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main>
        <h2>Contact Us</h2>

        <div class="contact-details">
            <p><strong>Address:</strong> Colombo 6</p>
            <p><strong>Phone:</strong> 011 123 3659</p>
            <p><strong>Email:</strong> info@pagenestbookshop.com</p>
        </div>

        <h3>Send Us a Message</h3>

        <div class="contact-form">
            <form>
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email">

                <label for="message">Message</label>
                <textarea id="message" name="message" placeholder="Write your message here..."></textarea>

                <button type="submit">Submit</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 PageNest Bookshop. All rights reserved.</p>
    </footer>

</body>
</html>
